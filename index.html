<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDGET — Gerenciador de Downloads</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --border:    #1e1e2e;
    --border2:   #2a2a3e;
    --text:      #e2e2f0;
    --muted:     #6b6b8a;
    --accent:    #7c6af7;
    --accent2:   #a78bfa;
    --green:     #34d399;
    --yellow:    #fbbf24;
    --red:       #f87171;
    --cyan:      #22d3ee;
    --radius:    10px;
    --font-sans: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, 'Cascadia Code', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.5;
    font-feature-settings: "kern" 1, "liga" 1;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: .5;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(10,10,15,.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -.015em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo span { color: var(--accent); }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .logo-dot.off { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,.4); }
    50%       { opacity: .7; box-shadow: 0 0 0 6px rgba(52,211,153,0); }
  }

  .status-ws {
    font-family: var(--font-mono);
    font-size: .72rem;
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .status-ws.conectado { color: var(--green); }
  .status-ws.erro      { color: var(--red); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  a.proto-link {
    font-family: var(--font-mono);
    font-size: .72rem;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 4px 10px;
    transition: all .2s;
    white-space: nowrap;
  }
  a.proto-link:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── Layout ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 36px 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* ── Add box ── */
  .add-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .add-box h2 {
    font-size: .8rem;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--accent2);
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: .85rem;
    padding: 14px 16px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color .2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .add-controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .add-controls > select#select-qualidade {
    flex: 0 0 auto;
  }
  .add-controls .btn-add {
    flex: 0 0 auto;
  }

  .destino-combobox {
    position: relative;
    flex: 1 1 200px;
    min-width: 160px;
    max-width: 100%;
  }
  .destino-input-wrap {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg);
    transition: border-color .2s;
  }
  .destino-input-wrap:focus-within {
    border-color: var(--accent);
  }
  .destino-input-wrap input[type="text"] {
    flex: 1;
    min-width: 0;
    border: none;
    border-radius: var(--radius);
    background: transparent;
  }
  .destino-input-wrap input[type="text"]:focus {
    box-shadow: none;
  }
  .destino-dropdown {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 4px);
    z-index: 200;
    max-height: 240px;
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    box-shadow: 0 12px 40px rgba(0,0,0,.45);
    display: none;
  }
  .destino-dropdown.aberto { display: block; }
  .destino-dropdown-label {
    padding: 8px 12px 4px;
    font-family: var(--font-mono);
    font-size: .62rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,.2);
  }
  .destino-dropdown-label:first-child { padding-top: 6px; }
  .destino-opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  .destino-opt:last-child { border-bottom: none; }
  .destino-opt:hover { background: rgba(124,106,247,.08); }
  .destino-opt.ativo {
    background: rgba(124, 106, 247, .28);
    box-shadow: inset 3px 0 0 var(--accent);
    padding-left: 9px;
  }
  .destino-opt.ativo:hover {
    background: rgba(124, 106, 247, .34);
  }
  .destino-opt.ativo .destino-opt-path {
    color: #d4ccff;
  }
  .destino-opt-star {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    margin: -6px 0;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 1.05rem;
    line-height: 1;
    color: var(--muted);
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: color .15s, background .15s, transform .1s;
  }
  .destino-opt-star:hover {
    color: var(--yellow);
    background: rgba(251, 191, 36, .12);
  }
  .destino-opt-star:active { transform: scale(.92); }
  .destino-opt-star.ativo { color: var(--yellow); }
  .destino-opt-path {
    font-family: var(--font-mono);
    font-size: .78rem;
    color: var(--text);
    word-break: break-all;
    flex: 1;
    min-width: 0;
  }
  .destino-opt-hint {
    font-size: .65rem;
    font-family: var(--font-mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    flex-shrink: 0;
  }
  .destino-opt.ativo .destino-opt-hint {
    color: var(--accent2);
  }

  select {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: .82rem;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  select:focus { border-color: var(--accent); }

  input[type="text"] {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: .82rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-sans);
    font-size: .88rem;
    font-weight: 600;
    padding: 10px 24px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    white-space: nowrap;
  }
  .btn-add:hover   { background: var(--accent2); }
  .btn-add:active  { transform: scale(.97); }
  .btn-add:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Section header ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: .75rem;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .badge {
    background: var(--border2);
    color: var(--text);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: .7rem;
  }
  .btn-small {
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    padding: 4px 10px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-small.danger {
    border-color: rgba(248,113,113,.35);
    color: var(--red);
  }
  .btn-small.danger:hover { border-color: var(--red); color: #fca5a5; }
  .btn-small:disabled { opacity: .45; cursor: not-allowed; }

  /* ── Download card ── */
  .dl-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .dl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 48px 1fr auto;
    gap: 14px;
    align-items: center;
    animation: slideIn .25s ease;
    transition: border-color .2s;
  }
  .dl-card:hover { border-color: var(--border2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dl-thumb {
    width: 48px; height: 36px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
    overflow: hidden;
  }
  .dl-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .dl-body { min-width: 0; }

  .dl-title {
    font-size: .88rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
  }

  .dl-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .dl-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .dl-status.pendente    { background: rgba(251,191,36,.12);  color: var(--yellow); }
  .dl-status.baixando    { background: rgba(124,106,247,.15); color: var(--accent2); }
  .dl-status.processando { background: rgba(34,211,238,.12);  color: var(--cyan); }
  .dl-status.concluido   { background: rgba(52,211,153,.12);  color: var(--green); }
  .dl-status.erro        { background: rgba(248,113,113,.12); color: var(--red); }

  .dl-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
  }
  .dl-info b { color: var(--cyan); font-weight: 600; }

  /* Progress bar */
  .dl-progress-wrap {
    margin-top: 8px;
    height: 3px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }
  .dl-progress-bar {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    transition: width .22s ease-out;
    position: relative;
  }
  .dl-progress-bar.concluido { background: var(--green); }
  .dl-progress-bar.erro      { background: var(--red); }

  /* Shimmer while downloading */
  .dl-progress-bar.baixando::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.25) 50%, transparent 100%);
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(200%); }
  }

  .dl-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-icon {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: .85rem;
    transition: all .15s;
  }
  .btn-icon:hover { border-color: var(--red); color: var(--red); }
  .btn-icon.btn-open-folder:hover { border-color: var(--cyan); color: var(--cyan); }
  .btn-icon.btn-open-file:hover { border-color: var(--green); color: var(--green); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: .8rem;
    border: 1px dashed var(--border2);
    border-radius: 12px;
  }
  .empty .icon { font-size: 2rem; margin-bottom: 10px; opacity: .4; }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-val {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
  }
  .stat-val.a { color: var(--accent2); }
  .stat-val.b { color: var(--cyan); }
  .stat-val.c { color: var(--green); }
  .stat-val.d { color: var(--red); }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: .68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot off" id="ws-dot"></div>
    <span>VD</span>GET
  </div>
  <div class="header-right">
    <a class="proto-link" href="vdget://iniciar" title="Uma vez: execute instalar-protocolo.bat nesta pasta (ou importe vdget-protocol.reg)">Ligar VDGET</a>
    <button type="button" class="btn-small danger" id="btn-parar-servidor" disabled
      onclick="encerrarServidor()"
      title="Encerra o processo Python (servidor WebSocket) neste computador">Parar servidor</button>
    <div class="status-ws erro" id="ws-status">● desconectado</div>
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val a" id="stat-baixando">0</div>
      <div class="stat-label">Baixando</div>
    </div>
    <div class="stat">
      <div class="stat-val b" id="stat-pendente">0</div>
      <div class="stat-label">Pendentes</div>
    </div>
    <div class="stat">
      <div class="stat-val c" id="stat-concluido">0</div>
      <div class="stat-label">Concluídos</div>
    </div>
    <div class="stat">
      <div class="stat-val d" id="stat-erro">0</div>
      <div class="stat-label">Com erro</div>
    </div>
  </div>

  <!-- Add box -->
  <div class="add-box">
    <h2>// Adicionar downloads</h2>
    <textarea id="input-urls" placeholder="Cole um ou mais links aqui (um por linha)&#10;https://youtube.com/watch?v=...&#10;https://twitter.com/..."></textarea>
    <div class="add-controls">
      <select id="select-qualidade">
        <option value="melhor">⬆ Melhor qualidade</option>
        <option value="pior">⬇ Menor tamanho</option>
        <option value="audio">🎵 Somente áudio (MP3)</option>
      </select>
      <div class="destino-combobox" id="destino-combobox">
        <div class="destino-input-wrap">
          <input type="text" id="input-destino" placeholder="Ao abrir a lista o campo esvazia para buscar; fora do foco mostra o selecionado"
            autocomplete="off" spellcheck="false" aria-autocomplete="list" aria-controls="destino-dropdown"
            aria-expanded="false" role="combobox">
        </div>
        <div class="destino-dropdown" id="destino-dropdown" role="listbox" aria-label="Pastas salvas"></div>
      </div>
      <button class="btn-add" id="btn-add" onclick="adicionarDownloads()">
        ↓ Iniciar Download
      </button>
    </div>
  </div>

  <!-- Ativos (baixando + pendentes) -->
  <div>
    <div class="section-header">
      <div class="section-title">
        Fila ativa
        <span class="badge" id="badge-ativos">0</span>
      </div>
    </div>
    <div class="dl-list" id="lista-ativos">
      <div class="empty" id="empty-ativos">
        <div class="icon">📭</div>
        Nenhum download na fila
      </div>
    </div>
  </div>

  <!-- Concluídos -->
  <div>
    <div class="section-header">
      <div class="section-title">
        Concluídos
        <span class="badge" id="badge-concluidos">0</span>
      </div>
      <button class="btn-small" onclick="limparConcluidos()">Limpar todos</button>
    </div>
    <div class="dl-list" id="lista-concluidos">
      <div class="empty" id="empty-concluidos">
        <div class="icon">✅</div>
        Nenhum download concluído ainda
      </div>
    </div>
  </div>

</main>

<script>
// ── WebSocket ──────────────────────────────────────────────────────────────
let ws = null;
let naoReconectar = false;
const WS_URL = 'ws://localhost:8765';
const downloads = {};
/** Caminho efetivo para download. */
let destinoCommitted = '';
/** Texto usado só para filtrar a lista; atualizado apenas em digitação manual (evento input). */
let destinoFilterManual = '';

/** Um único registro no localStorage: lista de caminhos + padrão (migra chaves antigas). */
const LS_CAMINHOS = 'vdget_caminhos_v1';
const LS_LEGACY_DESTINOS = 'vdget_destinos';
const LS_LEGACY_PADRAO = 'vdget_destino_padrao';
const MAX_DESTINOS_SALVOS = 30;
const DESTINO_BUILTIN = '/downloads';

function dedupePathsManterOrdem(arr) {
  const seen = new Set();
  const out = [];
  for (const x of arr) {
    if (seen.has(x)) continue;
    seen.add(x);
    out.push(x);
  }
  return out;
}

function ensureDestinoState(s) {
  let paths = dedupePathsManterOrdem(
    (s.paths || []).map(t => String(t).trim()).filter(Boolean)
  );
  if (!paths.includes(DESTINO_BUILTIN)) {
    paths = [DESTINO_BUILTIN, ...paths.filter(p => p !== DESTINO_BUILTIN)];
  }
  let padrao = (s.padrao != null ? String(s.padrao) : '').trim() || DESTINO_BUILTIN;
  if (!paths.includes(padrao)) {
    paths = [padrao, ...paths.filter(p => p !== padrao)];
  }
  paths = dedupePathsManterOrdem(paths).slice(0, MAX_DESTINOS_SALVOS);
  if (!paths.includes(padrao)) padrao = DESTINO_BUILTIN;
  return { paths, padrao };
}

function gravarDestinoState(s) {
  const c = ensureDestinoState(s);
  localStorage.setItem(LS_CAMINHOS, JSON.stringify({ v: 1, paths: c.paths, padrao: c.padrao }));
  return c;
}

function migrarDestinosLegado() {
  let paths = [];
  const rawPaths = localStorage.getItem(LS_LEGACY_DESTINOS);
  if (rawPaths) {
    try {
      const parsed = JSON.parse(rawPaths);
      if (Array.isArray(parsed)) {
        paths = parsed.filter(p => typeof p === 'string' && p.trim()).map(p => p.trim());
      } else if (typeof parsed === 'string' && parsed.trim()) {
        paths = [parsed.trim()];
      }
    } catch {
      const t = rawPaths.trim();
      if (t) paths = [t];
    }
  }
  let padrao = DESTINO_BUILTIN;
  const rawPad = localStorage.getItem(LS_LEGACY_PADRAO);
  if (rawPad !== null) {
    const t = rawPad.trim();
    padrao = t || DESTINO_BUILTIN;
  }
  const c = gravarDestinoState({ paths, padrao });
  try {
    localStorage.removeItem(LS_LEGACY_DESTINOS);
    localStorage.removeItem(LS_LEGACY_PADRAO);
  } catch {}
  return c;
}

function lerDestinoState() {
  const raw = localStorage.getItem(LS_CAMINHOS);
  if (raw) {
    try {
      const o = JSON.parse(raw);
      if (o && o.v === 1 && Array.isArray(o.paths)) {
        const paths = o.paths.filter(p => typeof p === 'string' && p.trim()).map(p => p.trim());
        const padrao = typeof o.padrao === 'string' ? o.padrao.trim() : '';
        const fixed = ensureDestinoState({ paths, padrao: padrao || DESTINO_BUILTIN });
        const salvo = JSON.stringify({ v: 1, paths: fixed.paths, padrao: fixed.padrao });
        if (salvo !== raw) localStorage.setItem(LS_CAMINHOS, salvo);
        return fixed;
      }
    } catch {}
  }
  return migrarDestinosLegado();
}

function loadDestinosSalvos() {
  return lerDestinoState().paths.slice();
}

function saveDestinosSalvos(arr) {
  const cur = lerDestinoState();
  gravarDestinoState({
    paths: arr.slice(0, MAX_DESTINOS_SALVOS),
    padrao: cur.padrao,
  });
}

/** Lista exibida: rota embutida + histórico (sem duplicar), ordem alfabética fixa. */
function listaDestinosCombinada() {
  const rest = loadDestinosSalvos().filter(p => p !== DESTINO_BUILTIN);
  const all = [DESTINO_BUILTIN, ...rest];
  return all.sort((a, b) =>
    a.localeCompare(b, 'pt-BR', { numeric: true, sensitivity: 'base' })
  );
}

function registrarDestinoUsado(path) {
  const p = String(path || '').trim();
  if (!p) return;
  const cur = lerDestinoState();
  const list = cur.paths.filter(x => x !== p);
  list.unshift(p);
  gravarDestinoState({ paths: list, padrao: cur.padrao });
  renderDestinoDropdown();
}

function getDestinoPadrao() {
  return lerDestinoState().padrao;
}

function setDestinoPadraoStorage(path) {
  const cur = lerDestinoState();
  const p = String(path || '').trim();
  gravarDestinoState({ paths: cur.paths, padrao: p ? p : DESTINO_BUILTIN });
}

function destinoDropdownAberto() {
  const dd = document.getElementById('destino-dropdown');
  return dd && dd.classList.contains('aberto');
}

function setDestinoDropdownAberto(aberto) {
  const dd = document.getElementById('destino-dropdown');
  const input = document.getElementById('input-destino');
  if (!dd || !input) return;
  dd.classList.toggle('aberto', aberto);
  input.setAttribute('aria-expanded', aberto ? 'true' : 'false');
  if (!aberto) input.value = destinoCommitted;
}

function filtrarPathsPorQuery(paths, q) {
  const needle = q.trim().toLowerCase();
  if (!needle) return paths.slice();
  return paths.filter(p => p.toLowerCase().includes(needle));
}

function appendDestinoDropdownRow(dd, p, padrao) {
  const row = document.createElement('div');
  row.className = 'destino-opt';
  row.dataset.path = p;
  if (destinoCommitted.trim() === p) row.classList.add('ativo');

  const starBtn = document.createElement('button');
  starBtn.type = 'button';
  starBtn.className = 'destino-opt-star' + (p === padrao ? ' ativo' : '');
  starBtn.textContent = p === padrao ? '★' : '☆';
  starBtn.title = 'Caminho padrão ao abrir a página';
  starBtn.setAttribute('aria-label', p === padrao ? `Remover padrão: ${p}` : `Definir como padrão: ${p}`);
  starBtn.setAttribute('aria-pressed', p === padrao ? 'true' : 'false');

  const pathSpan = document.createElement('span');
  pathSpan.className = 'destino-opt-path';
  pathSpan.textContent = p;

  const hint = document.createElement('span');
  hint.className = 'destino-opt-hint';
  const hintBits = [];
  if (p === padrao) hintBits.push('padrão');
  if (destinoCommitted.trim() === p) hintBits.push('selecionado');
  hint.textContent = hintBits.join(' · ');

  row.appendChild(starBtn);
  row.appendChild(pathSpan);
  row.appendChild(hint);

  row.addEventListener('mousedown', (e) => {
    if (e.target.closest('button.destino-opt-star')) return;
    e.preventDefault();
    destinoCommitted = p;
    destinoFilterManual = '';
    const inp = document.getElementById('input-destino');
    if (inp) inp.value = p;
    renderDestinoDropdown();
    setDestinoDropdownAberto(true);
  });

  starBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isPadrao = getDestinoPadrao() === p;
    if (!isPadrao) {
      setDestinoPadraoStorage(p);
      registrarDestinoUsado(p);
      return;
    }
    setDestinoPadraoStorage(DESTINO_BUILTIN);
    renderDestinoDropdown();
  });

  dd.appendChild(row);
}

function renderDestinoDropdown() {
  const dd = document.getElementById('destino-dropdown');
  const input = document.getElementById('input-destino');
  if (!dd || !input) return;

  const padrao = getDestinoPadrao();
  const commit = destinoCommitted.trim();
  const q = destinoFilterManual.trim();
  const all = listaDestinosCombinada();
  let listados = filtrarPathsPorQuery(all, q);
  if (commit && !listados.includes(commit)) {
    listados = [commit, ...listados];
  }

  dd.replaceChildren();

  if (!commit) {
    const lbl = document.createElement('div');
    lbl.className = 'destino-dropdown-label';
    lbl.textContent = 'Destino (servidor)';
    dd.appendChild(lbl);
    const info = document.createElement('div');
    info.className = 'destino-opt';
    info.style.cursor = 'default';
    info.style.color = 'var(--muted)';
    info.style.fontSize = '.78rem';
    info.textContent = 'Campo vazio ao enviar — pasta padrão do servidor';
    dd.appendChild(info);
  }

  const lbl2 = document.createElement('div');
  lbl2.className = 'destino-dropdown-label';
  lbl2.textContent = 'Opções disponíveis';
  dd.appendChild(lbl2);

  if (!listados.length) {
    const empty = document.createElement('div');
    empty.className = 'destino-opt';
    empty.style.cursor = 'default';
    empty.style.color = 'var(--muted)';
    empty.style.fontSize = '.78rem';
    empty.textContent = q
      ? `Nenhuma opção coincide com “${q}”. Enter adiciona esse caminho.`
      : (all.length ? 'Nenhuma entrada na lista.' : 'Nenhum caminho na lista.');
    dd.appendChild(empty);
    return;
  }

  listados.forEach(p => appendDestinoDropdownRow(dd, p, padrao));
}

let destinoClickOutsideBound = false;
function bindDestinoClickOutside() {
  if (destinoClickOutsideBound) return;
  destinoClickOutsideBound = true;
  document.addEventListener('click', (e) => {
    const root = document.getElementById('destino-combobox');
    if (root && !root.contains(e.target)) setDestinoDropdownAberto(false);
  });
}

function initDestinoCombobox() {
  const input = document.getElementById('input-destino');
  const dd = document.getElementById('destino-dropdown');
  if (!input || !dd) return;

  lerDestinoState();
  destinoCommitted = getDestinoPadrao();
  input.value = destinoCommitted;

  input.addEventListener('focus', () => {
    bindDestinoClickOutside();
    destinoFilterManual = '';
    input.value = '';
    setDestinoDropdownAberto(true);
    renderDestinoDropdown();
  });

  input.addEventListener('blur', () => {
    setTimeout(() => {
      const root = document.getElementById('destino-combobox');
      if (root && root.contains(document.activeElement)) return;
      setDestinoDropdownAberto(false);
    }, 0);
  });

  dd.addEventListener('mousedown', (e) => {
    e.preventDefault();
  });

  input.addEventListener('input', () => {
    destinoFilterManual = input.value;
    renderDestinoDropdown();
    if (!destinoDropdownAberto()) setDestinoDropdownAberto(true);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      setDestinoDropdownAberto(false);
      input.blur();
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      const v = input.value.trim();
      if (!v) return;
      destinoCommitted = v;
      registrarDestinoUsado(v);
      destinoFilterManual = '';
      input.value = '';
      renderDestinoDropdown();
      setDestinoDropdownAberto(true);
    }
  });

  bindDestinoClickOutside();
  renderDestinoDropdown();
}

function conectar() {
  try {
    ws = new WebSocket(WS_URL);
  } catch(e) {
    agendarReconexao(); return;
  }

  ws.onopen = () => {
    setStatus(true);
    console.log('[WS] Conectado');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if      (msg.tipo === 'estado_inicial')  carregarEstado(msg.downloads);
    else if (msg.tipo === 'adicionar')       adicionarCard(msg.download);
    else if (msg.tipo === 'atualizar')       atualizarCard(msg.download);
    else if (msg.tipo === 'remover')         removerCard(msg.id);
    else if (msg.tipo === 'limpar_concluidos') msg.ids.forEach(id => removerCard(id));
    else if (msg.tipo === 'servidor_encerrando') {
      const lbl = document.getElementById('ws-status');
      lbl.className = 'status-ws erro';
      lbl.textContent = '● encerrando servidor…';
    }
    atualizarStats();
  };

  ws.onclose = () => {
    setStatus(false);
    if (!naoReconectar) agendarReconexao();
  };
  ws.onerror = () => { setStatus(false); };
}

function agendarReconexao() {
  setTimeout(conectar, 3000);
}

function setStatus(ok) {
  const dot = document.getElementById('ws-dot');
  const lbl = document.getElementById('ws-status');
  const btnParar = document.getElementById('btn-parar-servidor');
  if (ok) {
    dot.classList.remove('off');
    lbl.className = 'status-ws conectado';
    lbl.textContent = '● conectado';
    document.getElementById('btn-add').disabled = false;
    if (btnParar) btnParar.disabled = false;
  } else {
    dot.classList.add('off');
    lbl.className = 'status-ws erro';
    lbl.textContent = naoReconectar
      ? '● servidor parado'
      : '● desconectado — reconectando...';
    document.getElementById('btn-add').disabled = true;
    if (btnParar) btnParar.disabled = true;
  }
}

function enviar(dados) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(dados));
  }
}

// ── Estado ────────────────────────────────────────────────────────────────
function carregarEstado(lista) {
  lista.forEach(dl => {
    downloads[dl.id] = dl;
    renderCard(dl);
  });
  atualizarStats();
}

// ── Ações ─────────────────────────────────────────────────────────────────
function adicionarDownloads() {
  const urls = document.getElementById('input-urls').value
    .split('\n').map(s => s.trim()).filter(Boolean);

  if (!urls.length) return;

  const destino = destinoCommitted.trim();

  enviar({
    acao:      'adicionar',
    urls,
    qualidade: document.getElementById('select-qualidade').value,
    destino,
  });

  if (destino) registrarDestinoUsado(destino);

  document.getElementById('input-urls').value = '';
}

function removerItem(id) {
  enviar({ acao: 'remover', id });
}

function limparConcluidos() {
  enviar({ acao: 'limpar_concluidos' });
}

function abrirPastaArquivo(id) {
  enviar({ acao: 'abrir_pasta_arquivo', id });
}

function abrirArquivoDireto(id) {
  enviar({ acao: 'abrir_arquivo', id });
}

function encerrarServidor() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (!confirm('Encerrar o servidor VDGET neste PC? Downloads em andamento serão interrompidos.')) return;
  naoReconectar = true;
  enviar({ acao: 'encerrar_servidor' });
}

// ── Renderização ──────────────────────────────────────────────────────────
const ICONES = {
  pendente:    '⏳',
  baixando:    '⬇',
  processando: '⚙',
  concluido:   '✓',
  erro:        '✕',
};

function listaAlvo(status) {
  return ['concluido', 'erro'].includes(status)
    ? document.getElementById('lista-concluidos')
    : document.getElementById('lista-ativos');
}

function renderCard(dl) {
  const lista = listaAlvo(dl.status);
  ocultarEmpty(lista);

  const card = document.createElement('div');
  card.className = 'dl-card';
  card.id = `card-${dl.id}`;
  card.dataset.status = dl.status;
  card.innerHTML = buildCardHTML(dl);
  lista.appendChild(card);
}

function adicionarCard(dl) {
  downloads[dl.id] = dl;
  renderCard(dl);
  atualizarStats();
}

function pctBarra(dl) {
  const n = Number(dl.progresso);
  if (Number.isFinite(n)) return Math.min(100, Math.max(0, n));
  return 0;
}

function atualizarCard(dl) {
  downloads[dl.id] = dl;
  const card = document.getElementById(`card-${dl.id}`);
  if (!card) return;

  const statusOld = card.dataset.status;
  const statusNovo = dl.status;

  // Se mudou de lista (ex: baixando -> concluido), re-renderiza
  if (statusOld !== statusNovo &&
      (['concluido','erro'].includes(statusNovo) !== ['concluido','erro'].includes(statusOld))) {
    card.remove();
    renderCard(dl);
    verificarEmpties();
    atualizarStats();
    return;
  }

  // Mesmo card na fila ativa: atualiza só a barra (mantém o elemento → width anima de verdade)
  const bar = card.querySelector('.dl-progress-bar');
  const podeLeve = bar && ['baixando', 'processando', 'pendente'].includes(statusNovo);
  if (podeLeve) {
    const pct = pctBarra(dl);
    const barClass = statusNovo === 'baixando' ? 'baixando'
      : statusNovo === 'concluido' ? 'concluido'
      : statusNovo === 'erro' ? 'erro' : '';
    bar.style.width = `${pct}%`;
    bar.className = 'dl-progress-bar ' + barClass;

    const st = card.querySelector('.dl-status');
    if (st) {
      st.className = 'dl-status ' + statusNovo;
      st.textContent = statusNovo;
    }
    let info = card.querySelector('.dl-meta .dl-info');
    if (statusNovo === 'baixando') {
      if (!info) {
        const meta = card.querySelector('.dl-meta');
        if (meta) {
          info = document.createElement('span');
          info.className = 'dl-info';
          meta.appendChild(info);
        }
      }
      if (info) {
        info.innerHTML = `<b>${escHtml(dl.velocidade || '')}</b>  ${escHtml(dl.baixado || '')}/${escHtml(dl.total || '')}  ETA ${escHtml(dl.eta || '')}`;
      }
    } else if (info) {
      info.remove();
    }

    card.dataset.status = dl.status;
    const thumb = card.querySelector('.dl-thumb');
    if (thumb) thumb.dataset.status = statusNovo;
    atualizarStats();
    return;
  }

  card.dataset.status = dl.status;
  card.innerHTML = buildCardHTML(dl);
  atualizarStats();
}

function removerCard(id) {
  delete downloads[id];
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.style.opacity = '0';
    card.style.transform = 'translateX(20px)';
    card.style.transition = 'all .2s';
    setTimeout(() => { card.remove(); verificarEmpties(); atualizarStats(); }, 200);
  }
}

function buildCardHTML(dl) {
  const pct       = pctBarra(dl);
  const barClass  = dl.status === 'concluido' ? 'concluido'
                  : dl.status === 'erro'      ? 'erro'
                  : dl.status === 'baixando'  ? 'baixando' : '';

  const infoExtra = dl.status === 'baixando'
    ? `<span class="dl-info"><b>${dl.velocidade || ''}</b>  ${dl.baixado || ''}/${dl.total || ''}  ETA ${dl.eta || ''}</span>`
    : dl.status === 'erro'
    ? `<span class="dl-info" style="color:var(--red)">${dl.erro || 'Erro desconhecido'}</span>`
    : dl.status === 'concluido'
    ? `<span class="dl-info">concluído às ${dl.fim || ''}</span>`
    : '';

  const thumbContent = dl.thumb
    ? `<img src="${dl.thumb}" alt="" onerror="this.style.display='none'">`
    : ICONES[dl.status] || '📦';

  const showProgress = ['baixando','processando','pendente'].includes(dl.status) || pct > 0;

  const botoesConcluido = dl.status === 'concluido'
    ? `<button type="button" class="btn-icon btn-open-folder" onclick="abrirPastaArquivo('${dl.id}')" title="Abrir pasta do arquivo">📂</button>${
        dl.arquivo
          ? `<button type="button" class="btn-icon btn-open-file" onclick="abrirArquivoDireto('${dl.id}')" title="Abrir arquivo">▶</button>`
          : ''
      }`
    : '';

  return `
    <div class="dl-thumb" data-status="${dl.status}">${thumbContent}</div>
    <div class="dl-body">
      <div class="dl-title" title="${escHtml(dl.url)}">${escHtml(dl.titulo || dl.url)}</div>
      <div class="dl-meta">
        <span class="dl-status ${dl.status}">${dl.status}</span>
        ${infoExtra}
      </div>
      ${showProgress ? `
      <div class="dl-progress-wrap">
        <div class="dl-progress-bar ${barClass}" style="width:${pct}%"></div>
      </div>` : ''}
    </div>
    <div class="dl-actions">
      ${botoesConcluido}
      <button type="button" class="btn-icon" onclick="removerItem('${dl.id}')" title="Remover">✕</button>
    </div>
  `;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Empties ───────────────────────────────────────────────────────────────
function ocultarEmpty(lista) {
  const e = lista.querySelector('.empty');
  if (e) e.style.display = 'none';
}

function verificarEmpties() {
  ['lista-ativos','lista-concluidos'].forEach(id => {
    const lista  = document.getElementById(id);
    const cards  = lista.querySelectorAll('.dl-card');
    const empty  = lista.querySelector('.empty');
    if (empty) empty.style.display = cards.length ? 'none' : 'block';
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────
function atualizarStats() {
  const vals = { baixando: 0, pendente: 0, concluido: 0, erro: 0, processando: 0 };
  Object.values(downloads).forEach(d => {
    if (vals[d.status] !== undefined) vals[d.status]++;
  });

  document.getElementById('stat-baixando').textContent  = vals.baixando + vals.processando;
  document.getElementById('stat-pendente').textContent  = vals.pendente;
  document.getElementById('stat-concluido').textContent = vals.concluido;
  document.getElementById('stat-erro').textContent      = vals.erro;

  const ativos = vals.baixando + vals.processando + vals.pendente;
  document.getElementById('badge-ativos').textContent     = ativos;
  document.getElementById('badge-concluidos').textContent = vals.concluido + vals.erro;
}

// ── Enter no textarea ─────────────────────────────────────────────────────
document.getElementById('input-urls').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) adicionarDownloads();
});

// ── Init ──────────────────────────────────────────────────────────────────
initDestinoCombobox();

conectar();
</script>
</body>
